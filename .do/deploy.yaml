spec:
  name: marchmadness
  workers:
    - name: monitor
      github:
        repo: okremer84/marchmadness
        branch: master
        deploy_on_push: true
      dockerfile_path: Dockerfile
      instance_size_slug: basic-xxs
      instance_count: 1
      envs:
        - key: SLACK_WEBHOOK_URL
          scope: RUN_TIME
          type: SECRET
        - key: TELEGRAM_BOT_TOKEN
          scope: RUN_TIME
          type: SECRET
        - key: TELEGRAM_CHAT_ID
          scope: RUN_TIME
          type: SECRET
